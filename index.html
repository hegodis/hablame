<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok 2 Nuevo Estilo</title>
    <style>
        :root {
            --bg-dark: #121212;
            --text-light: #ffffff;
            --accent: #fe2c55; /* Color corporativo TikTok */
            --secondary: #25f4ee;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow: hidden; }

        /* Contenedor Principal tipo Feed Vertical Scrolling de TikTok */
        .feed-container {
            width: 100vw;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Ocultar barra en Firefox */
        }
        .feed-container::-webkit-scrollbar { display: none; } /* Ocultar en Chrome/Safari */

        /* Cada Post ocupa exactamente toda la pantalla */
        .tiktok-post {
            position: relative;
            width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* Imagen principal adaptada a pantalla completa */
        .post-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #1a1a1a;
        }

        /* Barra Lateral Flotante de Acciones (Derecha) */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }
        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        .action-btn-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            transition: transform 0.2s;
        }
        .action-btn-circle:active { transform: scale(0.9); }
        .action-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        /* Información del Post en la parte inferior izquierda */
        .post-info-bottom {
            position: absolute;
            left: 15px;
            bottom: 30px;
            right: 80px;
            z-index: 10;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
        }
        .post-username { font-weight: bold; font-size: 1.1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 5px;}
        .post-caption { font-size: 0.95rem; line-height: 1.4; color: #e1e1e1; }

        /* Botón Flotante para Crear Post (Arriba) */
        .header-upload-btn {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: linear-gradient(90deg, var(--secondary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        /* Ventanas Emergentes Modales (Formularios y Comentarios) */
        .tiktok-modal {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100vw;
            height: 70vh;
            background: #1e1e1e;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            z-index: 200;
            transition: bottom 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        .tiktok-modal.active { bottom: 0; }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
            font-size: 1.1rem;
        }
        .close-modal { font-size: 1.5rem; cursor: pointer; color: #aaa; }

        /* Estilos del Formulario de Subida e Inputs */
        .form-group { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        input[type="text"], textarea {
            width: 100%; background: #2d2d2d; border: 1px solid #444; border-radius: 8px;
            padding: 12px; color: white; font-size: 1rem;
        }
        .file-box {
            background: #2d2d2d; border: 2px dashed #555; padding: 20px; text-align: center;
            border-radius: 8px; cursor: pointer;
        }
        .submit-btn {
            background: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px;
        }

        /* Lista de Comentarios Dinámica */
        .comments-scroll-area { flex: 1; overflow-y: auto; padding: 15px 0; display: flex; flex-direction: column; gap: 15px; }
        .comment-node { display: flex; gap: 12px; font-size: 0.9rem; }
        .comment-node img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .comment-body-text { display: flex; flex-direction: column; gap: 4px; }
        .comment-author { font-weight: bold; color: #aaa; }
        
        .comment-bar-input {
            display: flex; gap: 10px; padding-top: 10px; border-top: 1px solid #333;
        }
        .comment-bar-input input { flex: 1; }
    </style>
</head>
<body>

    <!-- CONTENEDOR PRINCIPAL DEL FEED (SCROLL VERTICAL) -->
    <div class="feed-container" id="main-tiktok-feed">

    </div>
