<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok 2.0</title>
    <style>
        :root {
            --bg-dark: #010101;
            --card-dark: #121212;
            --text-light: #ffffff;
            --accent-pink: #fe2c55;
            --accent-cyan: #25f4ee;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'SofiaPro', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); display: flex; justify-content: center; padding: 10px; }
        .app-container { width: 100%; max-width: 450px; padding-bottom: 80px; }
        
        /* Tarjetas Estilo TikTok */
        .tiktok-card { background: var(--card-dark); border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #2f2f2f; }
        h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--accent-cyan); }
        
        /* Perfil */
        .profile-row { display: flex; align-items: center; gap: 12px; }
        .avatar-main { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-pink); background: #333; }
        
        /* Inputs y Botones */
        input[type="text"], textarea { width: 100%; padding: 12px; background: #2f2f2f; border: 1px solid #444; border-radius: 8px; color: white; font-size: 0.95rem; margin-bottom: 10px; }
        textarea { resize: none; height: 70px; }
        .file-label { display: block; padding: 10px; background: #1e1e1e; border: 1px dashed var(--accent-cyan); border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 10px; font-size: 0.9rem; }
        input[type="file"] { display: none; }
        
        .btn-tiktok { width: 100%; background: var(--accent-pink); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.1s; }
        .btn-tiktok:active { transform: scale(0.98); }
        
        /* Post Feed */
        .post-video-repl { width: 100%; border-radius: 8px; margin-top: 8px; background: #000; max-height: 500px; object-fit: contain; }
        .post-info { margin: 8px 0; font-size: 0.95rem; }
        
        /* Botones de Acción Laterales/Inferiores */
        .action-bar { display: flex; gap: 20px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #2f2f2f; }
        .action-btn { background: none; border: none; color: white; display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; }
        .action-btn:hover { color: var(--accent-pink); }
        
        /* Comentarios */
        .comments-box { background: #1a1a1a; border-radius: 8px; padding: 10px; margin-top: 10px; }
        .comments-list { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
        .comment-item { font-size: 0.85rem; background: #252525; padding: 6px 10px; border-radius: 6px; }
        .comment-user { color: var(--accent-cyan); font-weight: bold; margin-right: 4px; }
        .comment-input-row { display: flex; gap: 6px; }
        .comment-input-row input { margin-bottom: 0; padding: 6px; font-size: 0.85rem; }
        .comment-input-row button { background: var(--accent-cyan); color: #000; border: none; padding: 0 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- PERFIL -->
    <div class="tiktok-card">
        <div id="p-view" class="profile-row" style="display:none;">
            <img id="my-avatar" class="avatar-main" src="" alt="avatar">
            <div>
                <h3 id="my-name" style="font-size:1rem;">Usuario</h3>
                <span id="btn-edit" style="color:var(--accent-cyan); font-size:0.8rem; cursor:pointer;">[Editar Perfil]</span>
            </div>
        </div>
        <div id="p-edit">
            <h2>Configura tu Perfil</h2>
            <input type="text" id="input-username" placeholder="Nombre de usuario...">
            <label class="file-label">📷 Seleccionar Foto de Perfil <input type="file" id="input-avatar" accept="image/*"></label>
            <button id="btn-save-profile" class="btn-tiktok" style="background:var(--accent-cyan); color:black;">Guardar</button>
        </div>
    </div>

    <!-- CREAR POST -->
    <div class="tiktok-card">
        <h2>Crear Publicación</h2>
        <textarea id="input-post-text" placeholder="¿Qué está pasando hoy?"></textarea>
        <label class="file-label">🖼️ Añadir Imagen al Post <input type="file" id="input-post-file" accept="image/*"></label>
        <button id="btn-submit-post" class="btn-tiktok">Publicar en el Feed</button>
    </div>

    <!-- FEED -->
    <div id="main-feed"></div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getDatabase, ref, push, set, onValue, runTransaction } from "https://gstatic.com";

    // ⚠️ REPLAZA CON TUS CREDENCIALES EXACTAS DE FIREBASE
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROJECT_://firebaseapp.com",
        databaseURL: "https://TU_PROJECT_://firebaseio.com",
        projectId: "TU_PROJECT_ID",
        storageBucket: "TU_PROJECT_://appspot.com",
        messagingSenderId: "TU_SENDER_ID",
        appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let localUser = JSON.parse(localStorage.getItem('tiktok_user')) || { name: 'Invitado', avatar: 'https://flaticon.com' };

    document.addEventListener('DOMContentLoaded', () => {
        refreshProfileUI();
        startFeedListener();

        document.getElementById('btn-save-profile').addEventListener('click', saveProfileData);
        document.getElementById('btn-edit').addEventListener('click', () => {
            document.getElementById('p-edit').style.display = 'block';
            document.getElementById('p-view').style.display = 'none';
        });
        document.getElementById('btn-submit-post').addEventListener('click', uploadNewPost);
    });

    // Compresor de imágenes integrado para evitar bloqueos de Chrome
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6)); // Compresión al 60%
                };
            };
        });
    }

    async function saveProfileData() {
        const name = document.getElementById('input-username').value.trim();
        const fileIn = document.getElementById('input-avatar').files[0];
        if(!name) return alert('Escribe tu nombre');
        
        localUser.name = name;
        if(fileIn) {
            localUser.avatar = await compressImage(fileIn);
        }
        localStorage.setItem('tiktok_user', JSON.stringify(localUser));
        refreshProfileUI();
    }

    function refreshProfileUI() {
        if(localStorage.getItem('tiktok_user')) {
            document.getElementById('p-edit').style.display = 'none';
            document.getElementById('p-view').style.display = 'flex';
            document.getElementById('my-name').innerText = localUser.name;
            document.getElementById('my-avatar').src = localUser.avatar;
        }
    }

    async function uploadNewPost() {
        const txt = document.getElementById('input-post-text').value.trim();
        const fileIn = document.getElementById('input-post-file').files[0];
        
        if(!txt && !fileIn) return alert('Escribe algo o selecciona una imagen');

        const btn = document.getElementById('btn-submit-post');
        btn.innerText = "Subiendo...";
        btn.disabled = true;

        let imgBase64 = "";
        if(fileIn) {
            imgBase64 = await compressImage(fileIn);
        }

        const newPostData = {
            user: localUser.name,
            avatar: localUser.avatar,
            text: txt,
            image: imgBase64,
            likes: 0,
            dislikes: 0,
            timestamp: Date.now()
        };

        try {
            const postsRef = ref(db, 'posts');
            await set(push(postsRef), newPostRefData);
            document.getElementById('input-post-text').value = '';
            document.getElementById('input-post-file').value = '';
        } catch (error) {
            alert("Error de Firebase: Asegúrate de poner tus credenciales y activar las reglas públicas.");
        } finally {
            btn.innerText = "Publicar en el Feed";
            btn.disabled = false;
        }
    }

    function startFeedListener() {
        onValue(ref(db, 'posts'), (snapshot) => {
            const data = snapshot.val();
            const feed = document.getElementById('main-feed');
            feed.innerHTML = '';
            if(!data) return;

            Object.keys(data).sort((a,b) => data[b].timestamp - data[a].timestamp).forEach(id => {
                const post = data[id];
                const card = document.createElement('div');
                card.className = 'tiktok-card';
