<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABLAME</title>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f8f9fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: var(--bg); color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-bottom: 15px; font-size: 1.2rem; }
        
        /* Perfil */
        .profile-setup { display: flex; flex-direction: column; gap: 10px; }
        .profile-display { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #ddd; }
        
        /* Inputs y Botones */
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        textarea { resize: vertical; min-height: 80px; }
        input[type="file"] { display: none; }
        .file-label { display: inline-block; padding: 8px 12px; background: #e9ecef; border: 1px dashed #999; border-radius: 6px; cursor: pointer; text-align: center; }
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.9; }
        
        /* Formulario de Post */
        .post-form { display: flex; flex-direction: column; gap: 12px; }
        
        /* Feed de publicaciones */
        .post { display: flex; flex-direction: column; gap: 12px; }
        .post-header { display: flex; align-items: center; gap: 10px; }
        .post-user { font-weight: bold; }
        .post-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; }
        .post-actions { display: flex; gap: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-action { background: none; color: #666; display: flex; align-items: center; gap: 5px; padding: 5px; cursor: pointer; border: none; }
        .btn-action:hover { color: var(--primary); }
        
        /* Sección de Comentarios */
        .comments-section { border-top: 1px solid #eee; padding-top: 12px; margin-top: 5px; }
        .comment-form { display: flex; gap: 8px; margin-top: 10px; }
        .comment-form input { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
        .comment-form button { padding: 8px 12px; }
        .comments-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        .comment-item { background: #f1f3f5; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; }
        .comment-user { font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- SECCIÓN DE PERFIL -->
    <div class="card">
        <div id="profile-view" class="profile-display" style="display: none;">
            <img id="display-avatar" class="avatar" src="" alt="Avatar">
            <div>
                <h3 id="display-name">Usuario</h3>
                <button id="btn-edit-profile" style="padding: 3px 8px; font-size: 0.8rem; margin-top: 5px;">Editar Perfil</button>
            </div>
        </div>
        <div id="profile-edit" class="profile-setup">
            <h2>Configura tu Perfil</h2>
            <input type="text" id="username-input" placeholder="Tu nombre de usuario">
            <label class="file-label">
                📷 Seleccionar Foto de Perfil
                <input type="file" id="avatar-input" accept="image/*">
            </label>
            <button id="btn-save-profile">Guardar Perfil</button>
        </div>
    </div>

    <!-- SECCIÓN CREAR POST -->
    <div class="card">
        <h2>Crear una publicación online</h2>
        <div class="post-form">
            <textarea id="post-text" placeholder="¿Qué quieres compartir con el mundo?"></textarea>
            <label class="file-label">
                🖼️ Agregar Imagen al Post
                <input type="file" id="post-file" accept="image/*">
            </label>
            <button id="btn-create-post">Publicar</button>
        </div>
    </div>

    <!-- FEED DE PUBLICACIONES -->
    <div id="feed"></div>
</div>

<!-- LIBRERÍAS Y LÓGICA CONECTADA -->
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getDatabase, ref, push, set, onValue, runTransaction } from "https://gstatic.com";

    // ⚠️ REPLAZA ESTO CON TUS CREDENCIALES DE FIREBASE REALTIME DATABASE
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROJECT_://firebaseapp.com",
        databaseURL: "https://TU_PROJECT_://firebaseio.com",
        projectId: "TU_PROJECT_ID",
        storageBucket: "TU_PROJECT_://appspot.com",
        messagingSenderId: "TU_SENDER_ID",
        appId: "TU_APP_ID"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Perfil en memoria local
    let userProfile = JSON.parse(localStorage.getItem('userProfile')) || { name: 'Anónimo', avatar: 'https://flaticon.com' };

    // Asignación segura de eventos cuando el diseño carga
    document.addEventListener('DOMContentLoaded', () => {
        updateProfileUI();
        listenToPosts();

        document.getElementById('btn-save-profile').addEventListener('click', saveProfile);
        document.getElementById('btn-edit-profile').addEventListener('click', editProfile);
        document.getElementById('btn-create-post').addEventListener('click', createPost);
    });

    function saveProfile() {
        const name = document.getElementById('username-input').value.trim();
        const fileInput = document.getElementById('avatar-input');
        
        if (!name) return alert('Por favor, ingresa un nombre');
        userProfile.name = name;

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                userProfile.avatar = e.target.result;
                localStorage.setItem('userProfile', JSON.stringify(userProfile));
                updateProfileUI();
            }
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            localStorage.setItem('userProfile', JSON.stringify(userProfile));
            updateProfileUI();
        }
    }

    function updateProfileUI() {
        if(localStorage.getItem('userProfile')) {
            document.getElementById('profile-edit').style.display = 'none';
            document.getElementById('profile-view').style.display = 'flex';
            document.getElementById('display-name').innerText = userProfile.name;
            document.getElementById('display-avatar').src = userProfile.avatar;
        }
    }

    function editProfile() {
        document.getElementById('profile-edit').style.display = 'flex';
        document.getElementById('profile-view').style.display = 'none';
        document.getElementById('username-input').value = userProfile.name;
    }

    function createPost() {
        const text = document.getElementById('post-text').value.trim();
        const fileInput = document.getElementById('post-file');

        if (!text && !fileInput.files[0]) return alert('Escribe algo o sube una imagen');

        const postData = {
            user: userProfile.name,
            avatar: userProfile.avatar,
            text: text,
            image: '',
            likes: 0,
            dislikes: 0,
            timestamp: Date.now()
        };

        const postsRef = ref(db, 'posts');
        const newPostRef = push(postsRef);

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                postData.image = e.target.result;
                set(newPostRef, postData);
                resetForm();
            }
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            set(newPostRef, postData);
            resetForm();
        }
    }

    function resetForm() {
        document.getElementById('post-text').value = '';
        document.getElementById('post-file').value = '';
    }

    function listenToPosts() {
        const postsRef = ref(db, 'posts');
        onValue(postsRef, (snapshot) => {
            const data = snapshot.val();
            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            if (!data) return;

            const sortedIds = Object.keys(data).sort((a, b) => data[b].timestamp - data[a].timestamp);

            sortedIds.forEach(id => {
                const post = data[id];
                const postCard = document.createElement('div');
                postCard.className = 'card post';
                
                let imgHTML = post.image ? `<img class="post-img" src="${post.image}" alt="Imagen">` : '';
                
                let commentsHTML = '';
                if (post.comments) {
                    Object.keys(post.comments).forEach(cId => {
                        const comment = post.comments[cId];
                        commentsHTML += `
                            <div class="comment-item">
                                <span class="comment-user">${comment.user}:</span>
                                <span>${comment.text}</span>
                            </div>
                        `;
                    });
                }

    }
