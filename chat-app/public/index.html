<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel Wifi Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="login-container">
        <h2>Registro de Usuario</h2>
        <input type="text" id="username" placeholder="Nombre de usuario" required>
        <input type="color" id="user-color" value="#E6B8B8">
        <label>Foto de Perfil:</label>
        <input type="file" id="avatar-input" accept="image/*">
        <button id="btn-login">Entrar al Chat</button>
    </div>

    <!-- Pantalla del Chat -->
    <div id="chat-container" class="hidden">
        <div id="chat-header">
            <h3>Sala de Chat</h3>
            <p>ID de Dispositivo detectado de forma segura.</p>
        </div>
        <div id="messages-box"></div>
        
        <!-- Input de Mensajes y Archivos -->
        <div id="input-area">
            <input type="text" id="msg-text" placeholder="Escribe un mensaje o añade emojis...">
            <input type="file" id="file-input" accept="image/*,video/*">
            <button id="btn-send">Enviar</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
